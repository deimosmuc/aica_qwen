name: Build & push Docker image

# Builds the KiCad-enabled app image and pushes it to the GitHub Container
# Registry (GHCR). Uses the built-in GITHUB_TOKEN — no extra secrets needed.

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # allows a manual run from the Actions tab

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # KiCad and the WeasyPrint render test self-skip when their native
      # deps are absent, so no apt/KiCad setup is needed here.
      - name: Run tests
        run: python -m pytest

  build:
    needs: test          # a red test suite blocks the image build & push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write      # required to push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Image name is derived automatically: ghcr.io/<owner>/<repo> (lowercased)
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
