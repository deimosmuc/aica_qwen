services:
  app:
    # Builds the KiCad-enabled image (see Dockerfile) — ~1.3 GB, first build
    # downloads KiCad 9, so allow a few minutes.
    build: .
    ports:
      - "8000:8000"
    environment:
      # Leave QWEN_API_KEY empty to run in Mock Mode (demo always works).
      - QWEN_API_KEY=${QWEN_API_KEY:-}
      - QWEN_MODEL=${QWEN_MODEL:-qwen-plus}
    volumes:
      - ./outputs:/app/outputs
